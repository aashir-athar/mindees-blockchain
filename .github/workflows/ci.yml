name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff

      - name: Static analysis (ruff)
        run: ruff check .

      - name: Module self-tests
        run: |
          for m in core vesting keystore network consensus mempool storage node wallet tokenomics forkchoice finality p2p; do
            echo "== $m =="
            python "$m.py"
          done

      - name: Property / invariant fuzzer
        run: python fuzz.py
